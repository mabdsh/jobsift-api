# JobSift API — nginx config
# Replace YOUR_SUBDOMAIN with your actual DuckDNS subdomain (e.g. jobsift)
# Run certbot after copying this file:
#   sudo certbot --nginx -d YOUR_SUBDOMAIN.duckdns.org

server {
    listen 80;
    server_name YOUR_SUBDOMAIN.duckdns.org;

    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name YOUR_SUBDOMAIN.duckdns.org;

    # Certbot fills these in automatically after running --nginx
    ssl_certificate     /etc/letsencrypt/live/YOUR_SUBDOMAIN.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_SUBDOMAIN.duckdns.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Basic security headers
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         DENY;

    # Extension sends job card text — 512 KB is plenty, 1 MB is the ceiling
    client_max_body_size 1M;

    # Proxy all requests to Node
    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Groq deep-analysis can take a few seconds — don't time out too early
        proxy_read_timeout 60s;
    }
}
