# Rolevance API — nginx reverse proxy config
# Replace YOUR_SUBDOMAIN with your actual DuckDNS subdomain (e.g. rolevance)
# Run certbot after copying this file:
#   sudo certbot --nginx -d YOUR_SUBDOMAIN.duckdns.org

# ── Connection-level rate limiting ─────────────────────────────────────────────
# Drops floods before they reach Node, keeping SQLite reads off the hot path.
# 30r/m ≈ 1 request every 2 seconds per IP — plenty for normal extension use.
# burst=15 allows short bursts (e.g. opening the popup after a long idle).
# Defined in the http{} context — place this outside both server{} blocks.
#
# To apply: add these two lines inside your nginx.conf http{} block:
#   limit_req_zone $binary_remote_addr zone=rolevance_api:10m rate=30r/m;
#   limit_req_status 429;

server {
    listen 80;
    server_name YOUR_SUBDOMAIN.duckdns.org;

    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name YOUR_SUBDOMAIN.duckdns.org;

    # Certbot fills these in automatically after running --nginx
    ssl_certificate     /etc/letsencrypt/live/YOUR_SUBDOMAIN.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_SUBDOMAIN.duckdns.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"                          always;
    add_header X-Frame-Options          "DENY"                             always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy          "no-referrer"                      always;
    add_header Permissions-Policy       "geolocation=(), camera=(), microphone=()" always;
    # CSP: admin panel uses inline styles/scripts (single-file HTML).
    # API endpoints are JSON-only — browsers shouldn't be rendering them directly.
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
        always;

    # Extension sends job card text — 512 KB is plenty, 1 MB is the hard ceiling
    client_max_body_size 1M;

    location / {
        # nginx-level rate limit — drop floods before they hit Node
        limit_req zone=rolevance_api burst=15 nodelay;

        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Groq deep-analysis can take a few seconds — don't time out too early
        proxy_read_timeout 60s;
    }
}